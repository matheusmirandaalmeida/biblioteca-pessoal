spring.application.name=biblioteca-pessoal
spring.data.mongodb.uri=mongodb://localhost:27017/biblioteca
spring.data.mongodb.database=biblioteca
spring.data.mongodb.auto-index-creation=true
server.port=8080

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

app.jwt.secret=${JWT_SECRET:change-this-development-secret-with-at-least-32-characters}
app.jwt.expiration-seconds=86400
